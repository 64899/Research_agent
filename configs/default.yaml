index:
  index_dir: data/index/test_index
  eval_file: data/eval/questions.jsonl

retrieval:
  retriever: bm25  # options: bm25, dense, hybrid
  top_k: 3
  alpha: 0.3

rerank:
  enabled: True
  candidate_k: 10
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2

llm:
  provider: vllm  # options: vllm, mock
  base_url: http://localhost:7890/v1
  api_key: abc123
  model_name: X
  temperature: 0.1
  max_tokens: 192

agent:
  default_mode: answer

logging:
  level: INFO
  log_file: logs/research_agent.log